# CI for opn-web-conference.
# The `test` job runs the pure, no-Core checks (typecheck + client unit tests).
# The `smoke` job runs the real-Core smokes (W0/W1/W2) when a Core is configured
# for CI, and skips honestly when one isn't — it never fakes a pass.
name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # No committed lockfile yet, so `npm install` rather than `npm ci`.
      - run: npm install
      - run: npm run typecheck
      - run: npm test

  # Real-Core smoke (W0 + W1 + W2). Runs only when a Core is configured for CI:
  # set the repo VARIABLE `OPN_CORE_URL` (a reachable dev/staging Core, e.g. on a
  # self-hosted runner or a persistent host) and the SECRET `OPN_TENANT_API_KEY`.
  # Without the variable the job skips the smoke rather than faking a pass — the
  # `test` job already covered typecheck + unit tests.
  #
  # To make this hermetic later (roadmap W3), stand up the opn-core dev stack as a
  # step here once it publishes a pullable image, then drop the config gate.
  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Real-Core smoke
        if: ${{ vars.OPN_CORE_URL != '' }}
        env:
          OPN_CORE_URL: ${{ vars.OPN_CORE_URL }}
          OPN_TENANT_API_KEY: ${{ secrets.OPN_TENANT_API_KEY }}
        run: |
          npm run smoke
          npm run smoke:w1
          npm run smoke:w2
      - name: Skip smoke (no Core configured)
        if: ${{ vars.OPN_CORE_URL == '' }}
        run: echo "No OPN_CORE_URL repo variable set — skipping real-Core smoke. Unit tests (typecheck + npm test) already ran in the 'test' job."
