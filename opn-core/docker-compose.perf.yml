# Sprint 10 production-shaped performance stack (roadmap §7.1, item 3).
# Postgres + Redis + MinIO only — no coturn, the design/soak scenarios never
# open a call. Core is NOT run here: it runs as a host release binary pinned to
# the E-cores (see the `perf` recipe in the justfile) so the loadgen and OS stay
# off the cores Core is measured on.
#
# Host ports mirror the dev stack (5432/6379/9000). The dev and perf stacks are
# never run at the same time, so the ports don't collide; the named volumes are
# separate (*_perf) so perf data never touches dev data.
services:
  postgres:
    image: postgres:16
    # Production-shaped tuning for the perf host. shared_buffers=1GB (roadmap
    # §7.1 wants 1–2GB) is the safe default — the dev host has only 6–8GB RAM,
    # so 2GB would starve everything else.
    command: postgres -c shared_buffers=1GB -c max_connections=100 -c work_mem=16MB
    environment:
      POSTGRES_USER: opn_migrate
      POSTGRES_PASSWORD: opn
      POSTGRES_DB: opn
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opn_migrate -d opn"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata_perf:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opn
      MINIO_ROOT_PASSWORD: opnsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - miniodata_perf:/data

  createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 opn opnsecret &&
      mc mb -p local/opn
      "

volumes:
  pgdata_perf:
  miniodata_perf:
