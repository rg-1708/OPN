# Sprint 11 production stack (roadmap item 1) — Coolify + Traefik.
#
# This is the deploy target: Core (built from ./Dockerfile) behind Traefik with
# TLS + sticky WebSockets, Postgres 16, Redis, MinIO, coturn. It is meant to be
# deployed by Coolify, which runs Traefik as its ingress; the `traefik.*` labels
# below wire TLS, HSTS, sticky sessions, and healthz-gated routing explicitly so
# they are versioned here, not clicked into a UI.
#
# SECRETS ARE NEVER HARDCODED. Every credential is a `${VAR}` reference resolved
# from Coolify's environment/secret store at deploy time. The required vars are
# listed in `docs/runbooks/deploy-rollback.md`. Nothing in this file is a real
# password.
#
# ROLE SPLIT (CDR-3): Core runs startup migrations as the owner role
# (OPN_MIGRATE_DATABASE_URL → opn_migrate) then serves all domain traffic as the
# least-privilege app role (DATABASE_URL → opn_app, NOSUPERUSER/NOBYPASSRLS) so
# RLS is actually enforced in production. The first migration creates opn_app.

services:
  core:
    build:
      # Context is the repo root (one dir up) so the image can build the panel
      # SPA (../opn-panel) alongside the Rust binary — see ../Dockerfile. The
      # root .dockerignore keeps target/, node_modules/, archive/, and .git out.
      context: ..
      dockerfile: opn-core/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Runtime pool = opn_app (RLS-enforced). Migrations = opn_migrate (owner).
      DATABASE_URL: postgres://opn_app:${OPN_DB_APP_PASSWORD}@postgres:5432/opn
      OPN_MIGRATE_DATABASE_URL: postgres://opn_migrate:${OPN_DB_MIGRATE_PASSWORD}@postgres:5432/opn
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: opn
      S3_KEY: ${OPN_S3_KEY}
      S3_SECRET: ${OPN_S3_SECRET}
      OPN_JWT_SECRET: ${OPN_JWT_SECRET}
      # App/WS listener — Traefik routes to this port on the internal network.
      OPN_BIND: 0.0.0.0:8080
      # Metrics on the internal interface ONLY (roadmap item 1). This port is
      # never published to the host and has NO Traefik router — only a Prometheus
      # scraping `core:9090` on this compose network can reach it. Do not add a
      # `ports:` entry or a traefik router for it.
      OPN_METRICS_BIND: 0.0.0.0:9090
      # Single replica at v1 (§9). Bumping to >1 turns on the Redis fan-out
      # listener (gateway) — a scale action, not a config project.
      OPN_REPLICAS: "1"
      # 4 tokio workers on the E-cores (OPN.md §7.1). Pair with a cpuset pin in
      # Coolify's resource limits — cpuset is host-topology-specific (the
      # i5-14500's E-cores are logical CPUs 12–19; verify with `lscpu -e`), so it
      # lives in the deploy config, not this portable file. Calibration knob.
      TOKIO_WORKER_THREADS: "4"
      RUST_LOG: ${OPN_RUST_LOG:-info}
      # WebRTC ICE servers echoed into calls.state (§10.4). JSON array of
      # RTCIceServer objects pointing at the coturn below (public host/creds).
      OPN_ICE_SERVERS: ${OPN_ICE_SERVERS}
      # Group calls (docs/opn-group-calls.md). All three unset/empty → group
      # calls disabled, everything else runs as before. URL is what BROWSERS
      # dial — the Traefik-terminated wss host below, not the internal name.
      LIVEKIT_URL: ${OPN_LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${OPN_LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${OPN_LIVEKIT_API_SECRET:-}
      # Admin panel API + SPA (docs/opn-panel-roadmap.md). Enabled by
      # ADMIN_JWT_SECRET alone (unset/empty → admin surface disabled); the login
      # password is NOT env — the operator sets it on first launch via the panel
      # (stored in the DB). When enabled, the same bind serves the panel SPA
      # (ADMIN_PANEL_DIR is baked into the image at /srv/panel by ../Dockerfile —
      # no config here). 0.0.0.0 INSIDE the container is required for the
      # host-loopback port publish below; the host-side bind stays 127.0.0.1
      # (ports entry), so it is reachable only via SSH tunnel/WireGuard.
      ADMIN_BIND: 0.0.0.0:9091
      ADMIN_JWT_SECRET: ${OPN_ADMIN_JWT_SECRET:-}
    ports:
      # Admin API: host loopback ONLY (docs/runbooks/panel-admin.md). Never a
      # Traefik router for this — the tunnel is the front door.
      - "127.0.0.1:9091:9091"
    healthcheck:
      # Healthz-gated rollout: Coolify/Traefik hold traffic until this passes
      # (PG SELECT 1 + Redis PING inside the handler). Rollback trigger if a new
      # image never goes healthy.
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    labels:
      - "traefik.enable=true"
      # Router: HTTPS only, LE cert. Coolify-specific: its Traefik names the TLS
      # entrypoint `https` (not stock `websecure`), and it does NOT expand
      # ${VAR} inside traefik labels (only in environment/command), so the host
      # is hardcoded here. Keep in sync with OPN_DOMAIN.
      # ponytail: hardcoded domain, Coolify won't substitute label vars.
      - "traefik.http.routers.opn-core.rule=Host(`opn-core.mainframenetwork.com`)"
      - "traefik.http.routers.opn-core.entrypoints=https"
      - "traefik.http.routers.opn-core.tls=true"
      - "traefik.http.routers.opn-core.tls.certresolver=letsencrypt"
      # HSTS. Min-TLS-1.2 via `tls.options=default@file` was dropped: Coolify
      # manages /traefik/dynamic and reconciles away hand-dropped options files,
      # so the block never registered and the router failed to build. Re-add the
      # TLS floor through Coolify's own TLS config (not a raw file), then restore
      # the tls.options label. See docs/runbooks/deploy-rollback.md.
      # ponytail: TLS floor deferred, uses Traefik default; upgrade via Coolify TLS config.
      - "traefik.http.routers.opn-core.middlewares=opn-hsts@docker"
      - "traefik.http.middlewares.opn-hsts.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.opn-hsts.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.opn-hsts.headers.forceSTSHeader=true"
      # Service: target the app port, sticky WS. Stickiness is cosmetic at one
      # replica but configured now so replica-2 is a scale action (§7.1).
      - "traefik.http.services.opn-core.loadbalancer.server.port=8080"
      - "traefik.http.services.opn-core.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.opn-core.loadbalancer.sticky.cookie.name=opn_affinity"
      - "traefik.http.services.opn-core.loadbalancer.sticky.cookie.secure=true"
      - "traefik.http.services.opn-core.loadbalancer.sticky.cookie.httponly=true"

  postgres:
    image: postgres:16
    restart: unless-stopped
    # Production-shaped tuning (§7.1). shared_buffers 1GB is the safe default for
    # the i5-14500 host; the operator raises to 2GB if RAM allows.
    command: postgres -c shared_buffers=1GB -c max_connections=100 -c work_mem=16MB
    environment:
      POSTGRES_USER: opn_migrate
      POSTGRES_PASSWORD: ${OPN_DB_MIGRATE_PASSWORD}
      POSTGRES_DB: opn
      # Consumed only by the initdb script below (pre-seeds opn_app's password
      # before Core's migration 0001 runs). Not used by Postgres itself.
      OPN_DB_APP_PASSWORD: ${OPN_DB_APP_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opn_migrate -d opn"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
      # One-time role pre-seed (fresh data dir only): gives opn_app the real
      # operator password so RLS-enforced runtime never uses the dev 'opn' seed.
      - ./deploy/postgres/initdb:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OPN_S3_KEY}
      MINIO_ROOT_PASSWORD: ${OPN_S3_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - miniodata:/data

  # One-shot: create the media bucket, then exit. `restart: no` so it does not
  # loop after its clean exit.
  createbucket:
    image: minio/mc
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${OPN_S3_KEY} ${OPN_S3_SECRET} &&
      mc mb -p local/opn
      "

  # SFU for group voice calls (docs/opn-group-calls.md). Media terminates here,
  # never in Core — Core only mints join tokens and receives the webhooks this
  # service posts to core:8080 over the compose network. Bridge networking (not
  # host) so Traefik can label-route the wss signal on 7880; RTC media uses the
  # published UDP range with use_external_ip for public ICE candidates.
  # ponytail: 61 published UDP ports via docker-proxy; move to host networking +
  # manual TLS if that ever measurably hurts.
  livekit:
    image: livekit/livekit-server:v1.13.4
    restart: unless-stopped
    ports:
      - "7881:7881"
      - "50000-50060:50000-50060/udp"
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50060
          use_external_ip: true
        keys:
          "${OPN_LIVEKIT_API_KEY}": "${OPN_LIVEKIT_API_SECRET}"
        webhook:
          api_key: "${OPN_LIVEKIT_API_KEY}"
          urls:
            - http://core:8080/v1/internal/livekit/webhook
    labels:
      - "traefik.enable=true"
      # wss signal endpoint browsers dial (OPN_LIVEKIT_URL must match this
      # host). Same Coolify caveats as the core router: hardcoded host, `https`
      # entrypoint. ponytail: hardcoded domain, Coolify won't substitute label vars.
      - "traefik.http.routers.opn-livekit.rule=Host(`livekit.mainframenetwork.com`)"
      - "traefik.http.routers.opn-livekit.entrypoints=https"
      - "traefik.http.routers.opn-livekit.tls=true"
      - "traefik.http.routers.opn-livekit.tls.certresolver=letsencrypt"
      - "traefik.http.services.opn-livekit.loadbalancer.server.port=7880"

  # WebRTC STUN/TURN (§5, §10.4). Not Core code — Core only echoes ice_servers
  # into calls.state. host networking so the relay's UDP range works without
  # per-port mapping. Credentials come from the environment.
  coturn:
    image: coturn/coturn
    restart: unless-stopped
    network_mode: host
    command: >
      -n --realm=${OPN_DOMAIN} --lt-cred-mech
      --user=${OPN_TURN_USER}:${OPN_TURN_PASSWORD}
      --min-port=49160 --max-port=49200 --listening-port=3478

volumes:
  pgdata:
  miniodata:
