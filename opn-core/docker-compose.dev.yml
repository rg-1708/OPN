services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: opn_migrate
      POSTGRES_PASSWORD: opn
      POSTGRES_DB: opn
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opn_migrate -d opn"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opn
      MINIO_ROOT_PASSWORD: opnsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - miniodata:/data

  createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 opn opnsecret &&
      mc mb -p local/opn
      "

  # WebRTC STUN/TURN for video calls (§5, §10.4). Not Core code — Core only
  # echoes the ice_servers config into calls.state (OPN_ICE_SERVERS). host
  # networking so the TURN relay's UDP range works without per-port mapping;
  # dev credentials are opn:opnsecret. Video bytes go P2P/relay, never Core.
  coturn:
    image: coturn/coturn
    network_mode: host
    command: >
      -n --realm=opn --lt-cred-mech --user=opn:opnsecret
      --no-tls --no-dtls --min-port=49160 --max-port=49200
      --listening-port=3478

volumes:
  pgdata:
  miniodata:
