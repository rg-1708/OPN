name: Chaos drills

# Weekly crash/restart drills (roadmap Sprint 9 item 3; §15: "run in CI weekly,
# not a one-time manual exercise"). Each script orchestrates its own compose
# stack + release Core and asserts a delivery guarantee by exit code — a red run
# means a guarantee broke across a fault. Expensive, so schedule-only + manual.
on:
  schedule:
    - cron: '0 4 * * 1' # Mondays 04:00 UTC
  workflow_dispatch:

jobs:
  chaos:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: opn-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: opn-core
      # The scripts bring up compose + Core themselves; the runner user is in
      # the docker group, so no `sg docker` wrapper is needed in CI.
      - name: kill9-mid-send
        run: bash chaos/kill9-mid-send.sh
      - name: pg-restart
        run: bash chaos/pg-restart.sh
      - name: redis-restart
        run: bash chaos/redis-restart.sh
      - name: link-drop
        run: bash chaos/link-drop.sh
